steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/analizador-uatcp', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/analizador-uatcp']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'analizador-uatcp'
      - '--image=gcr.io/$PROJECT_ID/analizador-uatcp'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--memory=4Gi'
      - '--cpu=2'
      - '--timeout=900s'
      - '--max-instances=10'
      - '--allow-unauthenticated'
images:
  - 'gcr.io/$PROJECT_ID/analizador-uatcp'
